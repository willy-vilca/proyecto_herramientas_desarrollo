<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="mobile-header">

    <button class="hamburger-btn"
            onclick="toggleSidebar()">

        &#9776;

    </button>

    <span class="mobile-title">
        Dashboard
    </span>

</div>

<div class="sidebar-overlay"
     onclick="toggleSidebar()">
</div>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2 sidebar d-flex flex-column justify-content-between">

            <div>

                <h3>Contador</h3>

                <hr>

                <a th:href="@{/dashboard}">
                    Dashboard
                </a>

                <a th:href="@{/clients}">
                    Clientes
                </a>

                <a th:href="@{/movements}">
                    Movimientos
                </a>

                <a th:href="@{/reports}">
                    Reportes
                </a>

            </div>

            <div class="logout-container">

                <a th:href="@{/logout}"
                   class="logout-btn">

                    Cerrar sesión

                </a>

            </div>

        </div>

        <!-- CONTENIDO -->

        <div class="col-md-10 main-content ps-4">

            <nav class="navbar page-header py-4 px-2 mb-4">

                <h3>

                    Bienvenido al sistema,
                    <span th:text="${primerNombre}">
                    </span>

                </h3>

            </nav>

            <!-- CARDS -->

            <div class="row mb-4">

                <div class="col-md-4">

                    <div class="card card-income p-3 shadow mb-3 mb-md-0">

                        <h5>Ingresos Totales</h5>

                        <h3>

                            S/.
                            <span th:text="${ingresos}"></span>

                        </h3>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card card-expense p-3 shadow mb-3 mb-md-0">

                        <h5>Gastos Totales</h5>

                        <h3>

                            S/.
                            <span th:text="${gastos}"></span>

                        </h3>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card card-balance p-3 shadow">

                        <h5>Balance Total</h5>

                        <h3>

                            S/.
                            <span th:text="${balance}"></span>

                        </h3>

                    </div>

                </div>

            </div>

            <div class="navbar py-1 mb-2"></div>

            <!-- TABLA -->

            <div class="card p-3">

                <h5>Últimos movimientos</h5>

                <div class="table-responsive-mobile">

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>Tipo</th>
                            <th>Cliente</th>
                            <th>Monto</th>
                            <th>Fecha</th>
                            <th>Descripción</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="m : ${ultimosMovimientos}">

                            <td>

                                <span
                                        th:class="${m.type == 'INGRESO'} ?
                                    'badge bg-success' :
                                    'badge bg-danger'">

                                    <span th:text="${m.type}"></span>

                                </span>

                            </td>

                            <td>

                                <strong
                                        th:text="${m.clientName}">
                                </strong>

                            </td>

                            <td th:text="${m.amount}"></td>

                            <td th:text="${m.transactionDate}"></td>

                            <td th:text="${m.description}"></td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    function toggleSidebar() {

        document
            .querySelector('.sidebar')
            .classList
            .toggle('active');

        document
            .querySelector('.sidebar-overlay')
            .classList
            .toggle('active');
    }

</script>

</body>
</html>
