<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Reportes</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

    <link rel="stylesheet"
          th:href="@{/css/reports.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<!-- MOBILE HEADER -->

<div class="mobile-header">

    <button class="hamburger-btn"
            onclick="toggleSidebar()">

        ☰

    </button>

    <span class="mobile-title">

        Reportes

    </span>

</div>

<div class="sidebar-overlay"
     onclick="toggleSidebar()">
</div>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2 sidebar d-flex flex-column justify-content-between">

            <div>

                <h3>Contador</h3>

                <hr>

                <a th:href="@{/dashboard}">
                    Dashboard
                </a>

                <a th:href="@{/clients}">
                    Clientes
                </a>

                <a th:href="@{/movements}">
                    Movimientos
                </a>

                <a th:href="@{/reports}">
                    Reportes
                </a>

            </div>

            <div class="logout-container">

                <a th:href="@{/logout}"
                   class="logout-btn">

                    Cerrar sesión

                </a>

            </div>

        </div>

        <!-- CONTENIDO -->

        <div class="col-md-10 main-content p-4">

            <nav class="navbar page-header pb-4 pt-1 mb-4">

                <h3>Reportes</h3>

            </nav>

            <!-- FILTROS -->

            <form method="get"
                  th:action="@{/reports}"
                  class="row g-2 mb-2"
                  id="reportForm">

                <div class="col-md-2">

                    <select name="clientId"
                            class="form-control border border-dark-subtle">

                        <option
                                th:each="c : ${clients}"
                                th:value="${c.clientId}"
                                th:text="${c.fullName}"
                                th:selected="${c.clientId == selectedClient}">
                        </option>

                    </select>

                </div>

                <div class="col-md-3">

                    <div class="row g-3 align-items-center">

                        <div class="col-auto">

                            <label class="col-form-label fw-bold">

                                Fecha Inicial:

                            </label>

                        </div>

                        <div class="col-auto">

                            <input type="date"
                                   name="startDate"
                                   th:value="${startDate}"
                                   class="form-control border border-dark-subtle"
                                   required>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="row g-3 align-items-center">

                        <div class="col-auto">

                            <label class="col-form-label fw-bold">

                                Fecha Final:

                            </label>

                        </div>

                        <div class="col-auto">

                            <input type="date"
                                   name="endDate"
                                   th:value="${endDate}"
                                   class="form-control border border-dark-subtle"
                                   required>

                        </div>

                    </div>

                </div>

                <div class="col-md-2">

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Generar reporte

                    </button>

                </div>

                <div class="col-md-2">

                    <button type="button"
                            id="btnPdf"
                            class="btn btn-outline-danger w-100">

                        Descargar PDF

                    </button>

                </div>

            </form>

            <div class="navbar py-2 mb-5"></div>
            <!-- CARDS RESUMEN -->

            <div class="row mb-4">

                <div class="col-md-4">

                    <div class="report-card card-income shadow mb-3 mb-md-0">

                        <h5>Ingresos</h5>

                        <h3 th:text="'S/. ' + ${#numbers.formatDecimal(ingresos,1,2)}">
                        </h3>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="report-card card-expense shadow mb-3 mb-md-0">

                        <h5>Gastos</h5>

                        <h3 th:text="'S/. ' + ${#numbers.formatDecimal(gastos,1,2)}">
                        </h3>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="report-card card-balance shadow">

                        <h5>Balance</h5>

                        <h3 th:text="'S/. ' + ${#numbers.formatDecimal(balance,1,2)}">
                        </h3>

                    </div>

                </div>

            </div>

            <div class="navbar py-2 mb-4"></div>

            <!-- GRAFICO + MOVIMIENTOS -->

            <div class="row justify-content-around">

                <!-- GRAFICO PIE -->

                <div class="col-md-3 chart-container mb-4">

                    <h5 class="mb-4">

                        Ingresos vs Gastos

                    </h5>

                    <canvas id="pieChart"></canvas>

                </div>

                <!-- TABLA MOVIMIENTOS -->

                <div class="col-md-8 chart-container mb-4">

                    <h5 class="mb-3">

                        Movimientos

                    </h5>

                    <div class="table-responsive-mobile">

                        <table class="table table-hover align-middle">

                            <thead>

                            <tr>

                                <th>Tipo</th>
                                <th>Monto</th>
                                <th>Fecha</th>
                                <th>Descripción</th>

                            </tr>

                            </thead>

                            <tbody id="movementsTableBody">

                            <tr th:each="m : ${movements}">

                                <td>

                                    <span
                                            th:classappend="${m.type == 'INGRESO'} ? 'bg-success' : 'bg-danger'"
                                            class="badge">

                                        <span th:text="${m.type}">
                                        </span>

                                    </span>

                                </td>

                                <td th:text="${m.amount}">
                                </td>

                                <td th:text="${m.transactionDate}">
                                </td>

                                <td th:text="${m.description}">
                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

            <div class="navbar py-2 mb-4"></div>

            <!-- RESUMEN CATEGORIAS -->

            <div class="row justify-content-around">

                <!-- TABLA -->

                <div class="col-md-5 chart-container">

                    <h5>

                        Resumen por Categorías

                    </h5>

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>Categoría</th>
                            <th>Total</th>

                        </tr>

                        </thead>

                        <tbody id="categoriesTableBody">

                        <tr th:each="entry : ${categories}">

                            <td th:text="${entry.key}">
                            </td>

                            <td th:text="${entry.value}">
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

                <!-- GRAFICO BARRAS -->

                <div class="col-md-6 chart-container">

                    <h5>

                        Gráfico por Categorías

                    </h5>

                    <canvas id="barChart"></canvas>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- DATOS PARA CHART.JS -->

<input type="hidden"
       id="ingresosValue"
       th:value="${ingresos}">

<input type="hidden"
       id="gastosValue"
       th:value="${gastos}">

<!-- DATOS CATEGORIAS -->

<div id="categoryData"
     style="display:none;">

    <div th:each="entry : ${categories}"
         class="category-item"
         th:data-name="${entry.key}"
         th:data-total="${entry.value}">
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



</body>

</html>
